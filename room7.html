<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="room.css">
  <link rel="stylesheet" href="general.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="context-menu.css">
  <link rel="stylesheet" href="https://use.typekit.net/bao6qio.css">
  <title>VaultVetica</title>
</head>
<body>
  <div id="page-fade" class="is-active"></div>

  <aside id="context-menu" class="context-menu">
    <div class="context-menu-header">
      <div class="context-menu-title" id="ctx-title"></div>
      <button class="context-menu-close" id="ctx-close">X</button>
    </div>
    <div class="context-menu-link">Links to: <span id="ctx-link-label"></span></div>
    <div class="context-menu-desc" id="ctx-desc"></div>
  </aside>

  <header class="header">
    <div class="left-section">
      <button onclick="back()" class="back">&larr; Back</button>
    </div>
    <div class="right-section">
      <button class="btn map-button" type="button" aria-label="Open map">
        Map <img class="map-button-icon" src="images/compass-icon.svg" alt="">
      </button>
    </div>
  </header>

  <div class="background-container">
    <img class="bunker-background" src="images/room_shell_tnl_right@2x.png">

    <!-- r7_mirror.png -->
    <div class="asset-container ctx-trigger"
         style="left:16.43%;top:28.77%;width:6.43%;"
         onmouseenter="openContext({ name: 'MIRROR', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r7_mirror.png" alt="Mirror">
      <div class="tool-tip">MIRROR</div>
    </div>

    <!-- r7_toilet.png -->
    <div class="asset-container ctx-trigger"
         style="left:8.76%;top:49.32%;width:15.00%;"
         onmouseenter="openContext({ name: 'TOILET', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r7_toilet.png" alt="Toilet">
      <div class="tool-tip">TOILET</div>
    </div>

    <!-- r7_bunks.png -->
    <div class="asset-container ctx-trigger"
         style="left:25.00%;top:36.45%;width:27.14%;"
         onmouseenter="openContext({ name: 'BUNKS', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r7_bunks.png" alt="Bunk beds">
      <div class="tool-tip">BUNKS</div>
    </div>

    <!-- r7_cabinet.png (no-click) -->
    <div class="asset-container no-click"
         style="left:52.14%;top:61.64%;width:8.57%;">
      <img class="asset-img" src="images/r7_cabinet.png" alt="Cabinet">
    </div>

    <!-- r7_wardrobe.png -->
    <div class="asset-container ctx-trigger"
         style="left:59.29%;top:32.88%;width:12.14%;"
         onmouseenter="openContext({ name: 'WARDROBE', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r7_wardrobe.png" alt="Wardrobe">
      <div class="tool-tip">WARDROBE</div>
    </div>

  </div>
  <img class="ground" src="images/ground rooms.png" alt="">

  <script>
    window.CURRENT_ROOM = 7;

    const fade = document.getElementById("page-fade");

    window.addEventListener("pageshow", (event) => {
      if (event.persisted) {
        fade.style.transition = "none";
        fade.classList.remove("is-active");
        fade.offsetHeight;
        fade.style.transition = "";
        return;
      }
      setTimeout(() => { fade.classList.remove("is-active"); }, 100);
    });

    function fadeToPage(url) {
      sessionStorage.setItem("fade-transition", "true");
      fade.style.transition = "";
      fade.classList.add("is-active");
      setTimeout(() => { window.location.href = url; }, 500);
    }

    function back() { fadeToPage("index.html"); }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') fadeToPage('index.html');
    });
  </script>
  <script src="context-menu.js"></script>
  <script src="nav.js"></script>
</body>
</html>
