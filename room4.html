<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="room1.css">
  <link rel="stylesheet" href="general.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="context-menu.css">
  <link rel="stylesheet" href="https://use.typekit.net/bao6qio.css">
</head>

<body>
  <div id="page-fade" class="is-active"></div>

  <aside id="context-menu" class="context-menu">
    <div class="context-menu-header">
      <div class="context-menu-title" id="ctx-title"></div>
      <button class="context-menu-close" id="ctx-close">X</button>
    </div>
    <div class="context-menu-link">Links to: <span id="ctx-link-label"></span></div>
    <div class="context-menu-desc" id="ctx-desc"></div>
  </aside>

  <header class="header">
    <div class="left-section">
      <button onclick="back()" class="back">&larr; Back</button>
    </div>
    <div class="right-section">
      <button class="btn map-button" type="button" aria-label="Open map">
        Map <img class="map-button-icon" src="images/compass-icon.svg" alt="">
      </button>
    </div>
  </header>

  <div class="background-container">

    <img class="bunker-background" src="images/underground mockup.svg">

    <div class="b1-container ctx-trigger">
      <div class="b1" onmouseenter="openContext({ name: 'SOFA', linkLabel: 'Graphic Design Lounge', desc: 'A curated resource for graphic design inspiration and industry examples. Use when researching visual directions or benchmarking design quality.', url: 'https://www.graphicdesignerlounge.com' })" onmouseleave="closeContext()" onclick="visitContext()">
        <img class="sofa" src="images/sofa button copy.png">
        <div class="tool-tip">Graphic Design lounge</div>
      </div>
    </div>

    <img src="images/shelf copy.png" class="shelf">

    <div class="b2-container ctx-trigger">
      <div class="b2" onmouseenter="openContext({ name: 'TABLE', linkLabel: 'Vev Design — Case Studies', desc: 'A collection of interactive and editorial design case studies. Use when looking for design references.', url: 'https://www.vev.design/blog/case-study-design-examples/' })" onmouseleave="closeContext()" onclick="visitContext()">
        <img class="table" src="images/table button copy.png">
        <div class="tool-tip">Table</div>
      </div>
    </div>

    <div class="b3-container ctx-trigger">
      <div class="b3" onmouseenter="openContext({ name: 'SHELVES', linkLabel: 'Vev Design — Case Studies', desc: 'Secondary reference to Vev design case studies. Use as an alternate entry point for design browsing.', url: 'https://www.vev.design/blog/case-study-design-examples/' })" onmouseleave="closeContext()" onclick="visitContext()">
        <img class="shelf-button" src="images/r1 shelf button copy.png">
        <div class="tool-tip">Shelves</div>
      </div>
    </div>
  </div>

<script>
  window.CURRENT_ROOM = 4;

  const fade = document.getElementById("page-fade");

  window.addEventListener("pageshow", (event) => {
    if (event.persisted) {
      fade.style.transition = "none";
      fade.classList.remove("is-active");
      fade.offsetHeight;
      fade.style.transition = "";
      return;
    }
    setTimeout(() => { fade.classList.remove("is-active"); }, 100);
  });

  function fadeToPage(url) {
    sessionStorage.setItem("fade-transition", "true");
    fade.style.transition = "";
    fade.classList.add("is-active");
    setTimeout(() => { window.location.href = url; }, 500);
  }

  function back() { fadeToPage("index.html"); }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') fadeToPage('index.html');
  });

</script>
  <script src="context-menu.js"></script>
  <script src="nav.js"></script>
</body>
</html>
