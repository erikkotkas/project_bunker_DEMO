<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="room.css">
  <link rel="stylesheet" href="general.css">
  <link rel="stylesheet" href="header.css">
  <link rel="stylesheet" href="context-menu.css">
  <link rel="stylesheet" href="https://use.typekit.net/bao6qio.css">
</head>
<body>
  <div id="page-fade" class="is-active"></div>

  <aside id="context-menu" class="context-menu">
    <div class="context-menu-header">
      <div class="context-menu-title" id="ctx-title"></div>
      <button class="context-menu-close" id="ctx-close">X</button>
    </div>
    <div class="context-menu-link">Links to: <span id="ctx-link-label"></span></div>
    <div class="context-menu-desc" id="ctx-desc"></div>
  </aside>

  <header class="header">
    <div class="left-section">
      <button onclick="back()" class="back">&larr; Back</button>
    </div>
    <div class="right-section">
      <button class="btn map-button" type="button" aria-label="Open map">
        Map <img class="map-button-icon" src="images/compass-icon.svg" alt="">
      </button>
    </div>
  </header>

  <div class="background-container">
    <img class="bunker-background" src="images/room_shell_tnl_left@2x.png">

    <!-- r6_bar_plates.png (no-click) -->
    <div class="asset-container no-click"
         style="left:41.42%;top:32.88%;width:13.22%;">
      <img class="asset-img" src="images/r6_bar_plates.png" alt="Bar plates">
    </div>

    <!-- r6_bench.png -->
    <div class="asset-container ctx-trigger"
         style="left:41.42%;top:53.43%;width:12.86%;"
         onmouseenter="openContext({ name: 'BENCH', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r6_bench.png" alt="Bench">
      <div class="tool-tip">BENCH</div>
    </div>

    <!-- r6_punching_bag.png -->
    <div class="asset-container ctx-trigger"
         style="left:32.84%;top:10.96%;width:3.57%;"
         onmouseenter="openContext({ name: 'PUNCHING BAG', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r6_punching_bag.png" alt="Punching bag">
      <div class="tool-tip">PUNCHING BAG</div>
    </div>

    <!-- r6_treadmill.png -->
    <div class="asset-container ctx-trigger"
         style="left:70.00%;top:45.22%;width:22.15%;"
         onmouseenter="openContext({ name: 'TREADMILL', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r6_treadmill.png" alt="Treadmill">
      <div class="tool-tip">TREADMILL</div>
    </div>

    <!-- r6_weight_rack.png -->
    <div class="asset-container ctx-trigger"
         style="left:55.71%;top:53.43%;width:16.43%;"
         onmouseenter="openContext({ name: 'WEIGHT RACK', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r6_weight_rack.png" alt="Weight rack">
      <div class="tool-tip">WEIGHT RACK</div>
    </div>

    <!-- r6_weights.png -->
    <div class="asset-container ctx-trigger"
         style="left:50.00%;top:76.72%;width:18.57%;"
         onmouseenter="openContext({ name: 'WEIGHTS', linkLabel: 'Placeholder', desc: 'Placeholder description.', url: '#' })"
         onmouseleave="closeContext()"
         onclick="visitContext()">
      <img class="asset-img" src="images/r6_weights.png" alt="Weights">
      <div class="tool-tip">WEIGHTS</div>
    </div>

  </div>
  <img class="ground" src="images/ground rooms.png" alt="">

  <script>
    window.CURRENT_ROOM = 6;

    const fade = document.getElementById("page-fade");

    window.addEventListener("pageshow", (event) => {
      if (event.persisted) {
        fade.style.transition = "none";
        fade.classList.remove("is-active");
        fade.offsetHeight;
        fade.style.transition = "";
        return;
      }
      setTimeout(() => { fade.classList.remove("is-active"); }, 100);
    });

    function fadeToPage(url) {
      sessionStorage.setItem("fade-transition", "true");
      fade.style.transition = "";
      fade.classList.add("is-active");
      setTimeout(() => { window.location.href = url; }, 500);
    }

    function back() { fadeToPage("index.html"); }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') fadeToPage('index.html');
    });
  </script>
  <script src="context-menu.js"></script>
  <script src="nav.js"></script>
</body>
</html>
